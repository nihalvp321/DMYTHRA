<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    
    <!-- Bootstrap CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='admin_dashboard.css') }}">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
        }
        
        h1, h2, h3, p {
            font-family: 'Poppins', sans-serif;
        }
        .sidebar {
            background-color: #f8f9fa;
            padding: 1rem;
            border-right: 1px solid #dee2e6;
            height: 100%;
        }

        .sidebar .btn {
            background-color: #198754;
            color: white;
            width: 100%;
            margin-bottom: 10px;
            border-radius: 5px;
        }

        .sidebar .btn:hover {
            background-color: #157347;
        }

        .table th, .table td {
            vertical-align: middle;
        }

        .navbar-brand img {
            height: 40px;
        }

        .profile-img {
            width: 40px;
            height: 40px;
            object-fit: cover;
        }
    </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-light shadow-sm" style="background:#008000;">
    <div class="container-fluid">
        <a class="navbar-brand d-flex align-items-center">
            <img src="{{ url_for('static', filename='DM.png') }}" alt="Dmythra Logo" class="me-2">
            <span style="color:white;">Dmythra Admin</span>
        </a>
        <a href="{{ url_for('admin_logout') }}" class="btn btn-danger">Logout</a>
    </div>
</nav>

<div class="container-fluid">
    <div class="row">

        <!-- Sidebar -->
        <div class="col-md-3 col-lg-2 sidebar pt-4">
            <form action="{{ url_for('add_motivation_class') }}" method="POST">
                <button type="submit" class="box-btn">Add Motivation Class</button>
            </form>
            <form action="{{ url_for('view_user_skills') }}" method="POST">
                <button type="submit" class="box-btn">User Skills</button>
            </form>
            <form action="{{ url_for('view_accessories_requests') }}" method="POST">
                <button type="submit" class="box-btn">User Accessories</button>
            </form>
            <form action="{{ url_for('admin_view_feedbacks') }}" method="POST">
                <button type="submit" class="box-btn">View Feedbacks</button>
            </form>
            <form action="{{ url_for('admin_skill_payments') }}" method="POST">
                <button type="submit" class="box-btn">Skill Payments</button>
            </form>
            <form action="{{ url_for('admin_accessory_payments') }}" method="POST">
                <button type="submit" class="box-btn">Accessory Payments</button>
            </form>
        </div>

        <!-- Main Content -->
        <div class="col-md-9 col-lg-10 p-4">
            <h2 class="mb-4">Admin Dashboard</h2>

            <!-- Search Form -->
            <form action="{{ url_for('admin_dashboard') }}" method="POST" class="row g-3 mb-4">
                <div class="col-auto">
                    <input type="text" name="search_query" placeholder="Search by UDID" class="form-control" />
                </div>
                <div class="col-auto">
                    <button type="submit" class="btn btn" style="background:#008000; color:white; width:80px">Search</button>
                </div>
            </form>

            <!-- User Table -->
            <div class="table-responsive">
                <table class="table table-bordered align-middle">
                    <thead class="table-success">
                        <tr>
                            <th>Username</th>
                            <th>UDID No</th>
                            <th>Phone No</th>
                            <th>Email</th>
                            <th>Profile Photo</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for user in users %}
                        <tr>
                            <td>{{ user['username'] }}</td>
                            <td>{{ user['udid'] }}</td>
                            <td>{{ user['phone'] }}</td>
                            <td>{{ user['email'] }}</td>
                            <td>
                                <img src="{{ url_for('static', filename='uploads/' + user['profile_image'] if user['profile_image'] != 'noprofile.png' else 'noprofile.png') }}?t={{ current_time }}" class="img-fluid rounded-circle" alt="Profile" style="width: 40px; height: 40px;" />
                            </td>
                            <td>
                                <form action="{{ url_for('delete_user', user_id=user['id']) }}" method="POST">
                                    <button type="submit" class="btn btn-danger btn-sm">Delete</button>
                                </form>
                            </td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>

        </div> <!-- End Main Content -->
    </div> <!-- End Row -->
</div> <!-- End Container -->

<!-- Bootstrap JS Bundle -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
