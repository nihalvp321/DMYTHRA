<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sponsor Post</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Poppins', sans-serif;
  }
  
  h1, h2, h3, p {
      font-family: 'Poppins', sans-serif;
  }
    body {
      margin: 0;
      background: white;
      min-height: 100vh;
    }

    .navbar {
      background-color: #008000;
      padding: 15px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      color: white;
      position: relative;
    }

    .back-button {
      display: flex;
      align-items: center;
      text-decoration: none;
      color: white;
      background-color: green;
      padding: 10px 15px;
      border-radius: 5px;
      font-weight: bold;
      transition: 0.3s;
    }

    .back-button i {
      margin-right: 5px;
    }

    .back-button:hover {
      background-color: darkgreen;
    }

    .logo {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
    }

    .logo img {
      width: 80px;
      height: auto;
    }

    .form-wrapper {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 40px 15px;
    }

    .form-container {
      background-color: #fff;
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 0 15px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 500px;
    }

    .form-title {
      text-align: center;
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 30px;
      color: #333;
    }

    .btn-submit {
      background-color: #008000;
      color: white;
      width: 100%;
      padding: 10px;
      font-weight: bold;
      border-radius: 8px;
      transition: 0.3s;
    }

    .btn-submit:hover {
      background-color: #006400;
    }
  </style>
</head>
<body>

  <nav class="navbar">
    <a href="{{ url_for('sponsor_accessories') }}" class="back-button">
      <i class="fas fa-arrow-left"></i> Back
    </a>
    <div class="logo">
      <img src="{{ url_for('static', filename='DM.png') }}" alt="Dmythra Logo">
    </div>
  </nav>

  <div class="form-wrapper">
    <div class="form-container">
      <h3 class="form-title">Sponsor The Need</h3>
      <form method="POST">
        <div class="mb-3">
          <label class="form-label">Name *</label>
          <input type="text" name="sponsor_name" class="form-control" required />
        </div>
        <div class="mb-3">
          <label class="form-label">Phone *</label>
          <input type="tel" name="phone" class="form-control" required />
        </div>
        <div class="mb-3">
          <label class="form-label">Email (Optional)</label>
          <input type="email" name="email" class="form-control" />
        </div>
        <div class="mb-3">
          <label class="form-label">Amount (₹) *</label>
          <input type="number" name="amount" class="form-control" required />
        </div>
        <button type="submit" class="btn btn-submit">Pay Now</button>
      </form>
      
      
    </div>
  </div>

</body>
</html>
