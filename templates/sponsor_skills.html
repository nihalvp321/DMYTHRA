<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin - View User Skills</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <style>
    body {
      font-family: 'Poppins', sans-serif;
  }
  
  h1, h2, h3, p {
      font-family: 'Poppins', sans-serif;
  }
    .navbar {
      background-color: #008000;
      padding: 15px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      color: white;
      position: relative;
    }
    .back-button {
      display: flex;
      align-items: center;
      text-decoration: none;
      color: white;
      background-color: green;
      padding: 10px 15px;
      border-radius: 5px;
      font-weight: bold;
      transition: 0.3s;
    }
    .back-button i {
      margin-right: 5px;
    }
    .back-button:hover {
      background-color: darkgreen;
    }
    .logo {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
    }
    .logo img {
      width: 80px;
      height: auto;
    }
    .post-card {
      height: 100%;
      display: flex;
      flex-direction: column;
    }
    .post-media {
      width: 100%;
      height: 250px;
      border-radius: 10px;
      object-fit: cover;
    }
    .profile-pic {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      object-fit: cover;
      margin-right: 10px;
    }
    .card-body {
      flex-grow: 1;
      display: flex;
      flex-direction: column;
    }
    .username {
      font-weight: bold;
      margin-left: 5px;
    }
    .btn-sponsor {
      background-color: #28a745;
      color: white;
      font-weight: 600;
      border-radius: 20px;
      padding: 6px 16px;
      transition: all 0.2s ease-in-out;
    }
    .btn-sponsor:hover {
      background-color: #218838;
      transform: scale(1.05);
      color: white;
    }
    
    .like-icon {
      cursor: pointer;
      font-size: 20px;
      transition: transform 0.2s ease;
    }
    .like-icon.clicked {
      transform: scale(1.3);
    }
  </style>
</head>
<body class="bg-light">

  <nav class="navbar">
    <a href="{{ url_for('sponsor_home') }}" class="back-button">
      <i class="fas fa-arrow-left"></i> Back
    </a>
    <div class="logo">
      <img src="{{ url_for('static', filename='DM.png') }}" alt="Dmythra Logo">
    </div>
  </nav>

  <div class="container my-4">
    <div class="row g-4">
      {% for post in posts %}
      <div class="col-12 col-sm-6 col-md-4 col-lg-3">
        <div class="card shadow-sm post-card">
          <div class="card-body">
            <div class="d-flex align-items-center mb-2">
              <img src="{{ url_for('static', filename='uploads/' + post['profile_image']) if post['profile_image'] != 'noprofile.png' else url_for('static', filename='noprofile.png') }}?t={{ current_time }}" class="profile-pic" alt="Profile">
              <span class="username">{{ post['username'] }}</span>
            </div>

            {% if post['media'].endswith(('.mp4', '.avi', '.mov', '.webm')) %}
            <video class="post-media mb-2" controls>
              <source src="{{ url_for('static', filename='uploads/' + post['media']) }}">
              Your browser does not support the video tag.
            </video>
            {% else %}
            <img src="{{ url_for('static', filename='uploads/' + post['media']) }}" class="post-media mb-2" />
            {% endif %}

            <p class="mb-2">{{ post['caption'] }}</p>
            <div class="d-flex justify-content-between align-items-center mt-2">
            
            <a href="{{ url_for('sponsor_post', post_id=post['id']) }}" class="btn btn-sm btn-sponsor">Sponsor</a>
          </div>
          </div>
        </div>
      </div>
      {% endfor %}

      {% if not posts %}
        <p class="text-center text-muted mt-5">No skill posts available.</p>
      {% endif %}
    </div>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      document.querySelectorAll('.like-icon').forEach(icon => {
        icon.addEventListener('click', function () {
          const postId = this.getAttribute('data-postid');
          const countSpan = document.getElementById(`like-count-${postId}`);
          let currentCount = parseInt(countSpan.textContent);

          fetch(`/like/${postId}`, { method: 'POST' })
            .then(res => res.json())
            .then(data => {
              if (data.status === 'liked') {
                this.classList.remove('far');
                this.classList.add('fas', 'text-danger');
                countSpan.textContent = currentCount + 1;
              } else {
                this.classList.remove('fas', 'text-danger');
                this.classList.add('far');
                countSpan.textContent = currentCount - 1;
              }

              this.classList.add('clicked');
              setTimeout(() => this.classList.remove('clicked'), 200);
            });
        });
      });
    });
  </script>

</body>
</html>
