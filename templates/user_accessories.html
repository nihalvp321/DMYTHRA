<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Get Accessories</title>
  <!-- Bootstrap CSS CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Optional: Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet"> 
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='user_accessories.css') }}" />
</head>
<body style="background-color: #f8f9fa;">

    <nav class="navbar">
        <a href="{{ url_for('userhome') }}" class="back-button">
            <i class="fas fa-arrow-left"></i> Back
        </a>
        <div class="logo">
          <img src="{{ url_for('static', filename='DM.png') }}" alt="Dmythra Logo">
        </div></nav>

        <div class="container" style="margin-top:100px;">
            <div class="card shadow-sm">
              <div class="card-header text-white" style="background:#008000;">
                <h4 class="mb-0">🛒 Request Accessories</h4>
              </div>
              
              <!-- Add padding to the form section using card-body -->
              <div class="card-body">
                <form action="{{ url_for('submit_accessory_request') }}" method="POST">
                  <div class="mb-3">
                    <label for="category" class="form-label">Category</label>
                    <select class="form-select" id="category" name="category" required>
                      <option value="">Select</option>
                      <option value="Accessories">Accessories</option>
                      <option value="Medicines">Medicines</option>
                      <option value="Study Materials">Study Materials</option>
                      <option value="Others">Others</option>
                    </select>
                  </div>
          
                  <div class="mb-3">
                    <label for="description" class="form-label">Describe your need</label>
                    <textarea class="form-control" id="description" name="description" rows="4" required></textarea>
                  </div>
          
                  <button type="submit" class="btn w-100 text-white" style="background:#008000;">Submit Request</button>
                </form>
              </div>
            </div>
          </div>
          

  <!-- Bootstrap JS (Popper + Bootstrap) -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
