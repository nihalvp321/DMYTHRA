<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>User Feedback</title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Poppins', sans-serif;
  }
  
  h1, h2, h3, p {
      font-family: 'Poppins', sans-serif;
  }
    .navbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 1000;
      background-color: #008000;
      padding: 15px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: white;
      height: 70px;
    }
    .back-button {
      display: flex;
      align-items: center;
      text-decoration: none;
      color: white;
      background-color: green;
      padding: 10px 15px;
      border-radius: 5px;
      font-weight: bold;
    }
    .back-button:hover {
      background-color: darkgreen;
    }
    .logo img {
      width: 50px;
    }
    .star-rating i {
      font-size: 1.5rem;
      cursor: pointer;
      color: #ccc;
    }
    .star-rating .selected {
      color: #ffc107;
    }
  </style>
</head>
<body style="background-color: #f8f9fa;">

  <nav class="navbar">
    <a href="{{ url_for('userhome') }}" class="back-button">
      <i class="fas fa-arrow-left"></i> Back
    </a>
    <div class="logo">
      <img src="{{ url_for('static', filename='DM.png') }}" alt="Dmythra Logo">
    </div>
  </nav>

  <div class="container" style="margin-top: 100px;">
    <div class="card shadow-sm">
      <div class="card-header text-white" style="background: #008000;">
        <h4 class="mb-0">💬 User Feedback</h4>
      </div>
      <div class="card-body">
        <form action="{{ url_for('submit_feedback') }}" method="POST">
          <div class="mb-3">
            <label for="feedback" class="form-label">Your Feedback</label>
            <textarea id="feedback" name="feedback" class="form-control" rows="4" required></textarea>
          </div>

          <div class="mb-3">
            <label class="form-label">Rate Your Experience</label>
            <div class="star-rating">
              <input type="hidden" id="rating" name="rating" value="0">
              <i class="fas fa-star" data-value="1"></i>
              <i class="fas fa-star" data-value="2"></i>
              <i class="fas fa-star" data-value="3"></i>
              <i class="fas fa-star" data-value="4"></i>
              <i class="fas fa-star" data-value="5"></i>
            </div>
          </div>

          <button type="submit" class="btn w-100 text-white" style="background: #008000;">Submit Feedback</button>
        </form>
      </div>
    </div>
  </div>

  <!-- JS for star selection -->
  <script>
    const stars = document.querySelectorAll('.star-rating i');
    const ratingInput = document.getElementById('rating');

    stars.forEach(star => {
      star.addEventListener('click', () => {
        const value = star.getAttribute('data-value');
        ratingInput.value = value;

        stars.forEach(s => s.classList.remove('selected'));
        for (let i = 0; i < value; i++) {
          stars[i].classList.add('selected');
        }
      });
    });
  </script>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
