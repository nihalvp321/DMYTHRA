<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>User Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <link rel="stylesheet" href="{{ url_for('static', filename='userhome.css') }}" />
  <script defer src="{{ url_for('static', filename='userhome.js') }}"></script>
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <style>
    /* You can keep your CSS here or in the external file */
    body {
      font-family: 'Poppins', sans-serif;
  }
  
  h1, h2, h3, p {
      font-family: 'Poppins', sans-serif;
  }
    .sidebar {
      background-color: #fff;
      padding: 1rem;
      border-right: 1px solid #ddd;
      min-height: 100vh;
    }
    .post-media {
      width: 100%;
      max-height: 500px;
      border-radius: 10px;
      object-fit: cover;
    }
    .profile-pic {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      object-fit: cover;
    }
    .like-btn.liked {
      color: red;
    }
  </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg fixed-top px-3" style="background:#008000;">
  <a class="navbar-brand d-flex align-items-center" href="#">
    <img src="{{ url_for('static', filename='DM.png') }}" alt="Logo" width="40" class="me-2"/>
    Dmythra
  </a>

  <div class="ms-auto d-flex align-items-center">
    <span class="text-white me-3 fw-bold">{{ session['user'] }}</span>
    <button class="btn btn-light rounded-circle me-3 p-0" onclick="openProfileModal()" style="width: 40px; height: 40px;">
      <img src="{{ url_for('static', filename='uploads/' + profile_image) if profile_image != 'noprofile.png' else url_for('static', filename='noprofile.png') }}?t={{ current_time }}" class="img-fluid rounded-circle" alt="Profile" style="width: 40px; height: 40px;" />
    </button>
  </div>
</nav>

<!-- Main Layout -->
<!-- Outer Wrapper (for layout after fixed navbar) -->
<div class="d-flex" style="padding-top: 70px;">

  <!-- Fixed Sidebar -->
  <div class="bg-white p-3 border-end position-fixed h-100" style="width: 300px; top: 70px; left: 0; z-index: 1030;">
    <form action="{{ url_for('user_motivation') }}" method="POST">
      <button type="submit" class="btn btn-success w-100 mb-3" style="background:#008000; height:55px">🎯 Motivation Class</button>
    </form>
    <form action="{{ url_for('skills') }}" method="POST">
      <button type="submit" class="btn btn-success w-100 mb-3" style="background:#008000; height:55px">📤 Upload Skills</button>
    </form>
    <form action="{{ url_for('user_get_accessories') }}" method="POST">
    <button class="btn btn-success w-100 mb-3" style="background:#008000; height:55px">🛒 Get Accessories</button>
    </form>
    <form action="{{ url_for('user_feedback') }}" method="POST">
    <button class="btn btn-success w-100 mb-3" style="background:#008000; height:55px">💬 Feedback</button>
    </form>
    <button onclick="confirmLogout()" class="btn btn-outline logout-btn w-100">Logout</button>
  </div>

  <!-- Main Content -->
  <div class="flex-grow-1 p-4" style="margin-left: 300px;">
  <div class="posts">
    {% for post in posts %}
    <div class="post-card">
      <div class="post-header">
        <img src="{{ url_for('static', filename='uploads/' + post['profile_image']) if post['profile_image'] != 'noprofile.png' else url_for('static', filename='noprofile.png') }}?t={{ current_time }}" class="profile-pic" />
        <strong>{{ post['username'] }}</strong>
      </div>

      {% if post['media'].endswith(('.mp4', '.avi', '.mov')) %}
      <video class="post-media" controls>
        <source src="{{ url_for('static', filename='uploads/' + post['media']) }}" type="video/mp4" />
      </video>
      {% else %}
      <img src="{{ url_for('static', filename='uploads/' + post['media']) }}" class="post-media" />
      {% endif %}

      <p class="caption">{{ post['caption'] }}</p>
    </div>
    {% endfor %}
  </div>
</div>


<!-- Profile Modal -->
<div class="modal" tabindex="-1" id="profileModal">
  <div class="modal-dialog">
    <div class="modal-content p-3">
      <div class="modal-header">
        <h5 class="modal-title">Update Profile</h5>
        <button type="button" class="btn-close" onclick="closeProfileModal()"></button>
      </div>
      <div class="modal-body">
        <form action="{{ url_for('update_profile') }}" method="POST" enctype="multipart/form-data">
          <input type="text" name="username" class="form-control mb-2" placeholder="New Username"/>
          <input type="password" name="password" class="form-control mb-2" placeholder="New Password"/>
          <input type="email" name="email" class="form-control mb-2" placeholder="New Email"/>
          <input type="tel" name="phone" class="form-control mb-2" placeholder="New Phone No"/>
          <label class="form-label">Profile Image:</label>
          <input type="file" name="profile_image" class="form-control mb-3"/>
          <button type="submit" class="btn btn-success w-100">Update</button>
        </form>
        <form action="{{ url_for('delete_profile_image') }}" method="POST" class="mt-3">
          <button type="submit" class="btn btn-danger w-100">Delete Profile Image</button>
        </form>
      </div>
    </div>
  </div>
</div>

<script>
  function confirmLogout() {
    Swal.fire({
      title: 'Are you sure?',
      text: "You will be logged out from your account.",
      icon: 'warning',
      showCancelButton: true,
      confirmButtonColor: '#008000',
      cancelButtonColor: '#d33',
      confirmButtonText: 'Yes, logout'
    }).then((result) => {
      if (result.isConfirmed) {
        window.location.href = "{{ url_for('logout') }}";
      }
    });
  }

  function openProfileModal() {
    const modal = new bootstrap.Modal(document.getElementById('profileModal'));
    modal.show();
  }

  function closeProfileModal() {
    const modal = bootstrap.Modal.getInstance(document.getElementById('profileModal'));
    modal.hide();
  }

  $(document).ready(function () {
    $(".like-btn").click(function () {
      var likeButton = $(this);
      var postId = likeButton.data("postid");
      var likeCountSpan = likeButton.next();
  
      $.post("/like/" + postId, function (data) {
        let currentLikes = parseInt(likeCountSpan.text());
  
        if (data.status === "liked") {
          likeCountSpan.text((currentLikes + 1) + " Likes");
          likeButton.addClass("liked text-danger").html("❤️");
        } else if (data.status === "unliked") {
          likeCountSpan.text((currentLikes - 1) + " Likes");
          likeButton.removeClass("liked text-danger").html("🤍");
        } else {
          alert(data.message || "Error");
        }
      });
    });
  });
  
</script>

</body>
</html>
