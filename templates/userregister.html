<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Registration - Dmythra</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='userreglog.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

    <div class="form-container">
        <h2>User Registration</h2>
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <p class="{{ category }}">{{ message }}</p>
                {% endfor %}
            {% endif %}
        {% endwith %}
        <form action="/userregister" method="POST" enctype="multipart/form-data">
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>
            <input type="password" name="confirm_password" placeholder="Confirm Password" required>
            <input type="text" name="udid" placeholder="UDID No (e.g., UD123)" required>
            <input type="tel" name="phone" placeholder="Phone No" required>
            <input type="email" name="email" placeholder="Email" required>
            <input type="hidden" name="id">
            <button type="submit">Register</button>
        </form>
        <p>Already have an account? <a href="/userlogin">Login</a></p>
    </div>

</body>
</html>
