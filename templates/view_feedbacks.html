<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin - User Feedbacks</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    body {
      background-color: #f8f9fa;
    }
    .navbar {
        background-color: #008000; /* Green Theme */
        padding: 15px 20px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        color: white;
        position: relative;
    }
    body {
      font-family: 'Poppins', sans-serif;
  }
  
  h1, h2, h3, p {
      font-family: 'Poppins', sans-serif;
  }
    
    /* Back Button - Left */
    .back-button {
        display: flex;
        align-items: center;
        text-decoration: none;
        color: white;
        background-color: green;
        padding: 10px 15px;
        border-radius: 5px;
        font-weight: bold;
        transition: 0.3s;
    }
    
    .back-button i {
        margin-right: 5px;
    }
    
    .back-button:hover {
        background-color: darkgreen;
    }
    
    /* Center Logo */
    .logo {
        position: absolute;
        left: 50%;
        transform: translateX(-50%);
    }
    
    .logo img {
        width: 80px;
        height: auto;
    }

    .card {
      border-radius: 12px;
    }

    .star-rating {
      color: #ffc107;
      font-size: 1.2rem;
    }
    .profile-img {
        width: 50px;
        height: 50px;
        object-fit: cover;
        border-radius: 50%;
        border: 2px solid #008000;
        margin-right: 12px;
      }
      .user-header {
        display: flex;
        align-items: center;
        margin-bottom: 10px;
      }
  </style>
</head>
<body>

    <nav class="navbar">
        <a href="{{ url_for('admin_dashboard') }}" class="back-button">
            <i class="fas fa-arrow-left"></i> Back
        </a>
        <div class="logo">
          <img src="{{ url_for('static', filename='DM.png') }}" alt="Dmythra Logo">
        </div></nav>

  <div class="container" style="margin-top:30px">
    <div class="row g-4">
      {% if feedbacks %}
        {% for fb in feedbacks %}
        <div class="col-md-6 col-lg-4">
            <div class="card shadow-sm p-3">
              <div class="user-header">
                <img src="{{ url_for('static', filename='uploads/' + fb['profile_image']) if fb['profile_image'] != 'noprofile.png' else url_for('static', filename='noprofile.png') }}?t={{ current_time }}" class="profile-img" alt="Profile">
                <div>
                  <h5 class="mb-0">{{ fb['username'] }}</h5>
                  <small class="text-muted">{{ fb['email'] }}</small><br>
                  <small class="text-muted">{{ fb['phone'] }}</small>
                </div>
              </div>
              <p class="mb-2">{{ fb['feedback'] }}</p>
              <div class="star-rating">
                {% for i in range(fb['rating']) %}★{% endfor %}
                {% for i in range(5 - fb['rating']) %}☆{% endfor %}
              </div>
            </div>
          </div>          
        {% endfor %}
      {% else %}
        <p class="text-center text-muted">No feedbacks found.</p>
      {% endif %}
    </div>
  </div>

</body>
</html>
